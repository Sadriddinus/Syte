<style>

    background-color: black;
    height: 100vh; 
    display: flex;
    column-gap: 10px;
    row-gap: 10px;
    padding: 10px;
    flex-wrap: wrap;
    justify-content: flex-start;
    align-content: start;
    align-items: normal;
}

<body class="flexContainer">
    <button
        onclick="document.body.appendChild(Object.assign(document.createElement('div'), {className: 'flexelemnt', textContent: ''}))">
